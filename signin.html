<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In / Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header  Start -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-expand-md">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Navbar</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link"  href="./index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Shop</a>
                        </li>
                        <li class="nav-item">
                            <a href="" class="nav-link">About</a>
                        </li>
                        <li class="nav-item">
                            <a href="" class="nav-link">Contact Us</a>
                        </li>
                        <li class="nav-item signBtn ">
                            <a href="" class="nav-link ">Sign In / Register </a>
                        </li>
                    </ul>
              </div>
            </div>
        </nav>
    </header>
    <!-- Header  End -->

    <!--Sign In / Register -->
    <section class="sign-in-section d-flex align-items-center justify-content-center">
    <img src="./images/Accessories.png" alt="" class="bg-image-signin" >
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-11 col-sm-8 col-md-6 col-lg-4 auth-card">
                    <div class="toggle-btn d-flex mb-3">
                        <button id="show-login" class="btn auth-btn active  w-50 text-white"> Sign In </button>
                        <button id="show-register" class="btn auth-btn w-50 text-white">Register</button>
                    </div>
                    <!--Sign In-->
                    <div class="sign-in-form" id="login-form" >
                        <h3 class="text-center mb-4 text-white">Welcome Back</h3>
                        <input type="email" placeholder="Enter Email Here" id="Iemail" class="form-control mb-3">
                        <input type="password" placeholder="Enter Password Here" id="Ipassword" class="form-control mb-3">
                        <button class="form-control btn btn-primary">Sign In</button>
                    </div>

                    <!--Register-->
                    <div class="sign-up-form" id="register-form">
                        <h3 class="text-center mb-4 text-white" >Welcome</h3>
                        <input type="email" placeholder="Enter Email Here" id="Remail" class="form-control mb-3">
                        <input type="password" placeholder="Enter Password Here" id="Rpassword" class="form-control mb-3">
                        <button class="form-control btn btn-success">Sign Up</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Sign In / Register End -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./js/app.js" type="module"></script>
</body>
</html>
