<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header  Start -->
    <nav class="navbar navbar-expand-lg  navbar-dark bg-dark sticky-top">
        <div class="container-fluid ">
            <a href="#" class="navbar-brand" >Navbar </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="topNav">
                <ul class="navbar-nav  ms-auto align-items-center " >
                    <li class="nav-item">
                        <a href="" class="nav-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="" class="nav-link">Shop</a>
                    </li>
                    <li class="nav-item px-3"><span class="text-light" id="user-display">Loading...</span></li>
                    <li class="nav-item"><button id="logout-btn" class="btn btn-outline-danger btn-sm">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Header  End -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">E-COMM STORE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="topNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Shop</a></li>
                    <li class="nav-item px-3"><span class="text-light" id="user-display">Loading...</span></li>
                    <li class="nav-item"><button id="logout-btn" class="btn btn-outline-danger btn-sm">Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 sidebar d-none d-md-block">
                <h5 class="text-muted mb-4">Menu</h5>
                <a href="#" class="nav-link-custom active">Dashboard</a>
                <a href="#" class="nav-link-custom">Add Products</a>
                <a href="#" class="nav-link-custom">Orders</a>
                <a href="#" class="nav-link-custom">Settings</a>
            </div>

            <main class="col-md-9 col-lg-10 main-content mt-5">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 text-white">Dashboard Overview</h1>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-12 col-sm-6 col-xl-3">
                        <div class="card stat-card bg-primary text-white shadow">
                            <div class="card-body">
                                <h6>Total Products</h6>
                                <h2 class="fw-bold" id="total-count-display">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-xl-3">
                        <div class="card stat-card bg-warning text-dark shadow">
                            <div class="card-body">
                                <h6>Pending Approval</h6>
                                <h2 class="fw-bold">00</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="table-card mb-5 shadow-sm">
                    <h5 class="mb-4">Quick Add Product</h5>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Name</th>
                                    <th>Price</th>
                                    <th>Image</th>
                                    <th class="text-end">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><input type="text" class="form-control" placeholder="Product Name" id="p-name"></td>
                                    <td><input type="number" class="form-control" placeholder="0.00" id="p-price"></td>
                                    <td><input type="file" class="form-control"></td>
                                    <td class="text-end">
                                        <button class="btn btn-success px-4" id="p-add">Add</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="table-card shadow-sm">
                    <h5 class="mb-4">Inventory List</h5>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>S.No</th>
                                    <th>Name</th>
                                    <th>Price</th>
                                    <th>Status</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="product-list">
                                
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <!-- Dashboard Area -->

    <!-- Dashboard Area End -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./js/app.js" type="module"></script>
</body>
</html>
